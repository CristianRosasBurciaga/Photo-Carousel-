<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Slider Example</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="slider">
        <img id="image" alt="Slide">
        <div class="controls">
            <button id="prev">⟨</button>
            <button id="next">⟩</button>
        </div>
        <div id="dots"></div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
